<div class="itinerary-container" *ngIf="itinerary">
  
  <!-- Header Section -->
  <div class="itinerary-header">
    <div class="header-main">
      <h1>🌍 {{ itinerary.destination || 'Your Trip' }}</h1>
      <p class="duration" *ngIf="itinerary.duration">🗓️ {{ itinerary.duration }}</p>
    </div>
    
    <div class="action-buttons">
      <button (click)="exportItinerary('text')" class="btn-action">
        📄 Export Text
      </button>
      <button (click)="exportItinerary('json')" class="btn-action">
        📋 Export JSON
      </button>
      <button (click)="printItinerary()" class="btn-action btn-print">
        🖨️ Print Itinerary
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="itinerary-content">
    
    <!-- Beautiful Parsed Day-by-Day Cards -->
    <div *ngIf="parsedDays && parsedDays.length > 0" class="parsed-itinerary">
      <div *ngFor="let day of parsedDays" class="day-card">
        <div class="day-card-header">
          <h2>Day {{ day.dayNumber }}</h2>
          <span class="day-date" *ngIf="day.date">{{ day.date }}</span>
        </div>
        
        <div class="day-card-body">
          <div *ngFor="let section of day.sections" class="section-block">
            <h3 class="section-title">
              <span class="time-badge">{{ section.period }}</span>
            </h3>
            
            <ul class="activity-list">
              <li *ngFor="let activity of section.activities" class="activity-item">
                <span class="bullet-dot"></span>
                <span class="activity-text">{{ activity }}</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Toggle for Raw text view -->
    <div class="raw-toggle-container" *ngIf="parsedDays && parsedDays.length > 0">
      <button (click)="showRaw = !showRaw" class="btn-toggle-raw">
        {{ showRaw ? '🙈 Hide Full Text View' : '👁️ View Full Text Itinerary' }}
      </button>
    </div>

    <!-- Raw Text View (fallback or when toggled) -->
    <div class="raw-itinerary-card" *ngIf="showRaw || !parsedDays || parsedDays.length === 0">
      <h3>📝 Full Text Itinerary</h3>
      <pre class="raw-text-pre">{{ itinerary.raw_itinerary }}</pre>
    </div>

  </div>
</div>
