<div class="rag-compact-widget">
  <div class="widget-header">
    <div class="header-title">
      <span class="widget-icon">📚</span>
      <h3>Travel Guides Knowledge Base (RAG)</h3>
      <span class="badge" *ngIf="uploadedDocuments.length > 0">{{ uploadedDocuments.length }} guide{{ uploadedDocuments.length > 1 ? 's' : '' }} active</span>
    </div>
    <button class="btn-clear-all" *ngIf="uploadedDocuments.length > 0" (click)="clearAllDocuments()" title="Remove all uploaded documents">
      🗑️ Clear All
    </button>
  </div>

  <div class="widget-body">
    <!-- File Selector Area -->
    <div class="upload-zone">
      <input type="file" accept=".pdf" (change)="onFileSelected($event)" id="compactFileInput" hidden>
      <label for="compactFileInput" class="btn-select" [class.file-selected]="selectedFile !== null">
        <span class="icon">{{ selectedFile ? '📄' : '📎' }}</span>
        <span class="text">{{ selectedFile ? selectedFile.name : 'Select Travel Guide PDF' }}</span>
      </label>
      
      <button class="btn-upload" [disabled]="!selectedFile || isUploading" (click)="uploadDocument()">
        <span *ngIf="!isUploading">⚡ Index PDF</span>
        <span *ngIf="isUploading">⏳ Processing...</span>
      </button>
    </div>

    <!-- Upload Status Msg -->
    <div class="status-msg" *ngIf="uploadMessage" [class.error]="uploadMessage.includes('❌')" [class.success]="uploadMessage.includes('✅')">
      {{ uploadMessage }}
    </div>

    <!-- Active Guides List -->
    <div class="active-guides" *ngIf="uploadedDocuments.length > 0">
      <span class="label">Indexed Files:</span>
      <div class="guides-tags">
        <span class="guide-tag" *ngFor="let doc of uploadedDocuments" title="{{ doc }}">
          📑 {{ doc }}
        </span>
      </div>
    </div>
  </div>
</div>
